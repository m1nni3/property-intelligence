<!DOCTYPE html>
<html lang="en" class="bg-slate-900 text-slate-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Property Intelligence</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="min-h-screen flex">
  <div id="sidebar"></div>
  <main class="flex-1 ml-60 p-6 lg:p-8 min-h-screen">
    <div class="app-page-title">
      <div class="page-title-wrapper">
        <div class="page-title-heading">
          <div class="page-title-icon"><i class="fa-solid fa-chart-pie"></i></div>
          <div>
            <div class="page-title-text">Dashboard</div>
            <div class="page-title-subheading">Platform overview at a glance</div>
          </div>
        </div>
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="kpi-grid"></div>
    <div class="main-card">
      <div class="card-header">
        <span><i class="fa-solid fa-clock-rotate-left text-indigo-400 mr-2"></i>Recent Activity</span>
      </div>
      <div class="card-body" id="recent-activity">
        <div class="skeleton h-20 w-full"></div>
      </div>
    </div>
  </main>
  <script type="module" src="/src/pages/dashboard.js"></script>
</body>
</html>
